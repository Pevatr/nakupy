<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dark background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0b1020;stop-opacity:1" />
    </linearGradient>
    <!-- Neon border gradient blue→purple -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <!-- Green glow filter for cart -->
    <filter id="greenGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Border glow filter -->
    <filter id="borderGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Outer glow filter -->
    <filter id="outerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Outer ambient glow (blue-purple haze) -->
  <rect x="40" y="40" width="432" height="432" rx="90" ry="90"
        fill="none" stroke="#6366f1" stroke-width="60" opacity="0.12"/>

  <!-- Neon border glow layer (blurred) -->
  <rect x="44" y="44" width="424" height="424" rx="80" ry="80"
        fill="none" stroke="url(#borderGrad)" stroke-width="14"
        opacity="0.6" filter="url(#outerGlow)"/>

  <!-- Main rounded square background -->
  <rect x="44" y="44" width="424" height="424" rx="80" ry="80"
        fill="#0d1628"/>

  <!-- Neon border (sharp) -->
  <rect x="44" y="44" width="424" height="424" rx="80" ry="80"
        fill="none" stroke="url(#borderGrad)" stroke-width="7"
        filter="url(#borderGlow)"/>

  <!-- Sparkle top-left -->
  <g transform="translate(82,82)" opacity="0.9">
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#7dd3fc" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#7dd3fc" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#7dd3fc" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#7dd3fc" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Sparkle bottom-right -->
  <g transform="translate(430,430)" opacity="0.85">
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#e879f9" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#e879f9" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-7" y1="-7" x2="7" y2="7" stroke="#e879f9" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="7" y1="-7" x2="-7" y2="7" stroke="#e879f9" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Shopping cart - green neon, with glow -->
  <g filter="url(#greenGlow)">
    <!-- Cart handle/pole -->
    <line x1="148" y1="148" x2="186" y2="148" stroke="#86efac" stroke-width="16" stroke-linecap="round"/>
    <!-- Cart body (trapezoid via path) -->
    <path d="M186 148 L210 148 L272 310 L390 310 L420 200 L210 200"
          fill="none" stroke="#86efac" stroke-width="16"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Cart bottom line -->
    <line x1="272" y1="310" x2="390" y2="310" stroke="#86efac" stroke-width="16" stroke-linecap="round"/>
    <!-- Wheel left -->
    <circle cx="300" cy="360" r="26" fill="none" stroke="#86efac" stroke-width="16"/>
    <circle cx="300" cy="360" r="8" fill="#86efac"/>
    <!-- Wheel right -->
    <circle cx="380" cy="360" r="26" fill="none" stroke="#86efac" stroke-width="16"/>
    <circle cx="380" cy="360" r="8" fill="#86efac"/>
  </g>
</svg>
